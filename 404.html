<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>404 - Lost in space</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #eaeaea;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .box {
            max-width: 500px;
        }

        h1 {
            font-size: 80px;
            margin: 0;
        }

        p {
            font-size: 18px;
            opacity: 0.8;
        }

        .small {
            font-size: 14px;
            opacity: 0.5;
            margin-top: 10px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: #4da3ff;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <div class="emoji">🚀</div>
    <h1>404</h1>
    <p>You seem to have drifted into deep space.</p>
    <p class="small">The page you’re looking for does not exist in this universe.</p>
    <a href="/">Teleport back home</a>
</div>

</body>
</html>
